<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Кофейня AR (GPS)</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none}
    #ui{position:fixed;top:0;left:0;right:0;z-index:999;pointer-events:none}
    #btns{display:flex;justify-content:center;gap:8px;padding:12px;pointer-events:auto}
    .abtn{background:rgba(0,0,0,.8);color:#fff;border:2px solid rgba(255,200,80,.5);padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;text-decoration:none;font-weight:bold}
    #hud{text-align:center;background:rgba(60,30,0,.88);border:2px solid rgba(255,200,80,.4);border-radius:14px;padding:8px 26px;color:#FFD700;font-size:1.4em;font-weight:bold;display:inline-block;margin:0 auto;display:flex;justify-content:center}
    #coords{text-align:center;font-size:12px;color:#fff;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px;margin-top:4px;display:flex;justify-content:center}
    #info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;max-width:92%;text-align:center}
    #gps-wait{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:rgba(0,0,0,.85);color:#fff;padding:24px 32px;border-radius:14px;text-align:center;font-size:15px}
    .fps{position:fixed;font-size:30px;font-weight:bold;pointer-events:none;z-index:999;animation:fup 1s ease-out forwards}
    .fps.g{color:#FFD700;text-shadow:0 0 12px gold}.fps.b{color:#FF4444}
    @keyframes fup{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}
    #result{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);justify-content:center;align-items:center;flex-direction:column;color:#FFD700;text-align:center;padding:20px}
    #result.show{display:flex}
    #result h2{font-size:1.8em;margin-bottom:12px}
    #result .again{margin-top:20px;padding:12px 24px;font-size:16px;cursor:pointer;border-radius:10px;background:rgba(255,200,80,.3);border:2px solid #FFD700;color:#fff}
  </style>
</head>
<body>

<div id="ui">
  <div id="btns">
    <a class="abtn" href="index.html">← Игра</a>
    <a class="abtn" href="ar.html">AR маркер</a>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 12px 8px">
    <div id="hud">Очки: <span id="sc">0</span> | <span id="timer">30</span> с | Стаканы: <span id="cups-on">0</span></div>
    <div id="coords">GPS: <span id="coord-val">определяем...</span></div>
  </div>
</div>

<div id="info">Поверни телефон и ищи стаканчики вокруг! Тапай (+5), не трогай студентов (−5).</div>

<div id="gps-wait">
  <div style="font-size:24px;margin-bottom:12px">Получение GPS...</div>
  <div style="font-size:13px;opacity:0.8">Разреши доступ к геолокации.<br>Выйди на улицу для лучшего сигнала.</div>
</div>

<div id="result">
  <h2>Время вышло!</h2>
  <p>Очки: <span id="final-score">0</span></p>
  <p style="font-size:1.4em;margin:8px 0" id="level">—</p>
  <button class="again" id="btn-again">Играть снова</button>
</div>

<a-scene
  vr-mode-ui="enabled: false"
  arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  loading-screen="enabled: false">

  <a-assets timeout="15000">
    <a-asset-item id="cup-glb" src="assets/coffee_cup.glb"></a-asset-item>
    <a-asset-item id="student-glb" src="assets/student.glb"></a-asset-item>
  </a-assets>

  <a-camera id="gps-cam" gps-camera rotation-reader></a-camera>
</a-scene>

<script>
var scEl    = document.getElementById('sc');
var timerEl = document.getElementById('timer');
var cupsOnEl= document.getElementById('cups-on');
var infoEl  = document.getElementById('info');
var coordEl = document.getElementById('coord-val');
var resultEl= document.getElementById('result');
var gpsWait = document.getElementById('gps-wait');
var sceneEl = document.querySelector('a-scene');

var score=0, timeLeft=30, timerInt=null;
var cupN=0, studN=0, spawnT=null, studT=null, _actx;
var userLat=null, userLon=null, gameStarted=false;
var activeCups = 0;

function ac(){ if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function beep(f,d){ try{ var c=ac(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
function sndOk(){ beep(523,0.12); setTimeout(function(){beep(659,0.12);},100); }
function sndBad(){ beep(200,0.25); }

function addScore(n){ score=Math.max(0,score+n); scEl.textContent=score; }
function showPts(t,g){ var d=document.createElement('div'); d.className='fps '+(g?'g':'b'); d.textContent=t; d.style.left=(30+Math.random()*40)+'%'; d.style.top='40%'; document.body.appendChild(d); setTimeout(function(){d.remove();},1100); }
function lvl(s){ return s>=80?'Barista Legend!':s>=50?'Barista Pro!':s>=25?'Barista Junior':'Стажёр'; }

function finishGame(){
  clearInterval(spawnT);
  clearInterval(studT);
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  document.getElementById('final-score').textContent=score;
  document.getElementById('level').textContent=lvl(score);
  resultEl.classList.add('show');
}

var spawnAngle = 0;
function rndOffset(){
  spawnAngle += 1.2 + Math.random() * 0.8;
  var dist = (1 + Math.random()*2) / 111000;
  return { lat: Math.cos(spawnAngle)*dist, lon: Math.sin(spawnAngle)*dist };
}

function makeCup(){
  if(!userLat) return;
  var o = rndOffset();
  var lat = userLat + o.lat;
  var lon = userLon + o.lon;

  var el = document.createElement('a-entity');
  el.setAttribute('id', 'cup' + (cupN++));
  el.setAttribute('look-at', '[gps-camera]');
  el.setAttribute('scale', '8 8 8');
  el.setAttribute('class', 'clickable');
  el.setAttribute('position', '0 1.2 0');

  var m = document.createElement('a-entity');
  m.setAttribute('gltf-model', '#cup-glb');
  el.appendChild(m);

  el.setAttribute('animation__spin', 'property:rotation; to:0 360 0; dur:2500; loop:true; easing:linear');

  var taken=false;
  el.addEventListener('click', function(){
    if(taken)return; taken=true;
    addScore(5); sndOk(); showPts('+5',true);
    infoEl.textContent='+5 | Очки: '+score;
    el.setAttribute('animation__die','property:scale; to:0 0 0; dur:300');
    setTimeout(function(){
      if(el.parentNode) el.remove();
      if(activeCups>0) activeCups--;
      if(cupsOnEl) cupsOnEl.textContent = activeCups;
    },320);
  });

  sceneEl.appendChild(el);
  activeCups++;
  if(cupsOnEl) cupsOnEl.textContent = activeCups;
  el.setAttribute('gps-entity-place', 'latitude: '+lat+'; longitude: '+lon+';');
  if(el.components['gps-entity-place'] && el.components['gps-entity-place']._updatePosition) {
    el.components['gps-entity-place']._updatePosition();
  }
  setTimeout(function(){
    if(!taken && el.parentNode) el.remove();
    if(!taken && activeCups>0) activeCups--;
    if(!taken && cupsOnEl) cupsOnEl.textContent = activeCups;
  },14000);
}

function makeStud(){
  if(!userLat) return;
  var o = rndOffset();
  var lat = userLat + o.lat;
  var lon = userLon + o.lon;

  var el = document.createElement('a-entity');
  el.setAttribute('look-at', '[gps-camera]');
  el.setAttribute('scale', '5 5 5');
  el.setAttribute('class', 'clickable');

  var m = document.createElement('a-entity');
  m.setAttribute('gltf-model', '#student-glb');
  el.appendChild(m);

  var hit=false;
  el.addEventListener('click', function(){
    if(hit)return; hit=true;
    addScore(-5); sndBad(); showPts('-5',false);
    infoEl.textContent='-5! Очки: '+score;
    setTimeout(function(){if(el.parentNode)el.remove();},400);
  });

  sceneEl.appendChild(el);
  el.setAttribute('gps-entity-place', 'latitude: '+lat+'; longitude: '+lon+';');
  if(el.components['gps-entity-place'] && el.components['gps-entity-place']._updatePosition) {
    el.components['gps-entity-place']._updatePosition();
  }
  setTimeout(function(){if(!hit&&el.parentNode)el.remove();},12000);
}

function startGame(){
  if(gameStarted) return;
  gameStarted = true;
  gpsWait.style.display = 'none';
  infoEl.textContent = 'Поверни телефон — ищи стаканчики вокруг! Тапай (+5), не трогай студентов (−5).';

  makeCup();
  spawnT = setInterval(makeCup, 1500);
  studT  = setInterval(makeStud, 5000);

  timeLeft=30; timerEl.textContent=30;
  if(timerInt) clearInterval(timerInt);
  timerInt = setInterval(function(){
    timerEl.textContent = --timeLeft;
    if(timeLeft<=0) finishGame();
  }, 1000);
}

document.getElementById('btn-again').addEventListener('click',function(){
  resultEl.classList.remove('show');
  score=0; scEl.textContent='0'; gameStarted=false;
  timeLeft=30; timerEl.textContent='30';
  if(timerInt)clearInterval(timerInt);
  if(sceneEl){
    var list = sceneEl.querySelectorAll('a-entity[gps-entity-place]');
    for(var i=0;i<list.length;i++) list[i].remove();
  }
  startGame();
});

var DEFAULT_LAT = 55.7539;
var DEFAULT_LON = 37.6208;

function setCoords(lat, lon, demo){
  userLat = lat;
  userLon = lon;
  coordEl.textContent = lat.toFixed(5)+', '+lon.toFixed(5) + (demo ? ' (демо)' : '');
  if(!gameStarted) startGame();
}

function useFallback(){
  if(userLat != null && userLon != null) return;
  infoEl.textContent = 'GPS недоступен — используем демо-координаты (Москва).';
  var cam = document.getElementById('gps-cam');
  if(cam && cam.components['gps-camera']){
    cam.setAttribute('gps-camera', 'simulateLatitude: '+DEFAULT_LAT+'; simulateLongitude: '+DEFAULT_LON+';');
  }
  setCoords(DEFAULT_LAT, DEFAULT_LON, true);
}

window.addEventListener('gps-camera-update-position', function(e){
  setCoords(e.detail.position.latitude, e.detail.position.longitude, false);
});

if(navigator.geolocation){
  navigator.geolocation.watchPosition(
    function(pos){ setCoords(pos.coords.latitude, pos.coords.longitude, false); },
    function(){ useFallback(); },
    {enableHighAccuracy:true, timeout:10000}
  );
} else {
  useFallback();
}

useFallback();

document.querySelector('a-scene').addEventListener('loaded', function(){
  var canvas = this.canvas;
  var scene3d = this.object3D;
  var raycaster = new THREE.Raycaster();
  var pointerNDC = new THREE.Vector2();

  function getPointerCoords(evt){
    var x = (evt.touches && evt.touches[0]) ? evt.touches[0].clientX : evt.clientX;
    var y = (evt.touches && evt.touches[0]) ? evt.touches[0].clientY : evt.clientY;
    return { x: x || 0, y: y || 0 };
  }

  function toNDC(screenX, screenY){
    var rect = canvas.getBoundingClientRect();
    pointerNDC.x = (screenX - rect.left) / rect.width * 2 - 1;
    pointerNDC.y = -(screenY - rect.top) / rect.height * 2 + 1;
  }

  function findClickableEntity(threeObject){
    var obj = threeObject;
    while (obj) {
      if (obj.el && obj.el.classList && obj.el.classList.contains('clickable')) {
        return obj.el;
      }
      obj = obj.parent;
    }
    return null;
  }

  function onPointerTap(evt){
    var coords = getPointerCoords(evt);
    toNDC(coords.x, coords.y);

    var camEl = document.querySelector('[camera]');
    if (!camEl || !camEl.components || !camEl.components.camera) return;
    var threeCamera = camEl.components.camera.camera;

    raycaster.setFromCamera(pointerNDC, threeCamera);
    var hits = raycaster.intersectObject(scene3d, true);

    for (var i = 0; i < hits.length; i++) {
      var entity = findClickableEntity(hits[i].object);
      if (entity) {
        entity.dispatchEvent(new MouseEvent('click', { bubbles: true }));
        return;
      }
    }
  }

  canvas.addEventListener('click', onPointerTap, false);
  canvas.addEventListener('touchstart', function(e){ e.preventDefault(); onPointerTap(e); }, { passive: false });
});
</script>
</body>
</html>
