<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>Кофейня AR (GPS)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif;touch-action:none}
    #cam-bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}
    .aframe-canvas{z-index:1!important}
    #btns{position:fixed;top:12px;left:0;right:0;z-index:99;display:flex;justify-content:center;gap:8px;padding:0 12px}
    .abtn{background:rgba(0,0,0,.8);color:#fff;border:2px solid rgba(255,200,80,.5);padding:10px 16px;border-radius:10px;font-size:13px;cursor:pointer;text-decoration:none;font-weight:bold}
    #hud{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none;background:rgba(60,30,0,.88);border:2px solid rgba(255,200,80,.4);border-radius:14px;padding:8px 26px;color:#FFD700;font-size:1.4em;font-weight:bold}
    #coords{position:fixed;top:110px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none;font-size:12px;color:#fff;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px}
    #info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99;pointer-events:none;background:rgba(0,0,0,.78);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;max-width:92%;text-align:center}
    .fps{position:fixed;font-size:30px;font-weight:bold;pointer-events:none;z-index:99;animation:fup 1s ease-out forwards}
    .fps.g{color:#FFD700;text-shadow:0 0 12px gold}.fps.b{color:#FF4444}
    @keyframes fup{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-70px) scale(.8)}}
    #result{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);justify-content:center;align-items:center;flex-direction:column;color:#FFD700;text-align:center;padding:20px}
    #result.show{display:flex}
    #result h2{font-size:1.8em;margin-bottom:12px}
    #result .again{margin-top:20px;padding:12px 24px;font-size:16px;cursor:pointer;border-radius:10px;background:rgba(255,200,80,.3);border:2px solid #FFD700;color:#fff}
  </style>
</head>
<body>

<video id="cam-bg" autoplay playsinline muted></video>

<div id="btns">
  <a class="abtn" href="index.html">← Игра</a>
  <a class="abtn" href="ar.html">AR маркер</a>
</div>
<div id="hud">Очки: <span id="sc">0</span> | <span id="timer">60</span> с</div>
<div id="coords">GPS: <span id="coord-val">определяем...</span></div>
<div id="info">Крути телефон — ищи стаканчики вокруг! Тапай на них (+5), не трогай студентов (−5).</div>

<div id="result">
  <h2>Время вышло!</h2>
  <p>Очки: <span id="final-score">0</span></p>
  <p style="font-size:1.4em;margin:8px 0" id="level">—</p>
  <button class="again" id="btn-again">Играть снова</button>
</div>

<a-scene
  id="scene"
  embedded
  renderer="alpha:true; antialias:true"
  vr-mode-ui="enabled:false"
  loading-screen="enabled:false">

  <a-assets timeout="10000">
    <a-asset-item id="cup-glb" src="assets/coffee_cup.glb"></a-asset-item>
  </a-assets>

  <a-light type="ambient" color="#ffeedd" intensity="0.9"></a-light>
  <a-light type="point" color="#ffcc99" intensity="1.2" position="0 3 0" distance="20"></a-light>

  <a-entity id="rig">
    <a-camera
      id="cam"
      look-controls="magicWindowTrackingEnabled:true; touchEnabled:false"
      cursor="fuse:false; rayOrigin:mouse"
      raycaster="objects:.clickable; far:30">
    </a-camera>
  </a-entity>

  <a-entity id="world"></a-entity>
</a-scene>

<script>
var DEFAULT_LAT = 55.7539, DEFAULT_LON = 37.6208;
var userLat = DEFAULT_LAT, userLon = DEFAULT_LON;
var coordEl = document.getElementById('coord-val');
var scEl = document.getElementById('sc'), timerEl = document.getElementById('timer');
var infoEl = document.getElementById('info'), resultEl = document.getElementById('result');
var world = document.getElementById('world');
var score = 0, gameOn = false, timeLeft = 60, timerInt = null;
var cupN = 0, studN = 0, spawnT = null, studT = null, _actx;

/* Камера */
navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }})
  .then(function(s){ document.getElementById('cam-bg').srcObject = s; })
  .catch(function(){});

/* GPS */
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    function(p){ userLat=p.coords.latitude; userLon=p.coords.longitude; coordEl.textContent=userLat.toFixed(4)+', '+userLon.toFixed(4); },
    function(){ coordEl.textContent=DEFAULT_LAT.toFixed(4)+', '+DEFAULT_LON.toFixed(4)+' (демо)'; },
    { enableHighAccuracy:true, timeout:8000 }
  );
} else { coordEl.textContent=DEFAULT_LAT.toFixed(4)+', '+DEFAULT_LON.toFixed(4)+' (демо)'; }

/* Звук */
function ac(){ if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)(); return _actx; }
function beep(f,d,v){ try{ var c=ac(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=f;g.gain.setValueAtTime(v||.3,c.currentTime); g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d); o.start();o.stop(c.currentTime+d); }catch(e){} }
function sndOk(){ beep(523,.12,.4); setTimeout(function(){beep(659,.12,.4);},100); }
function sndBad(){ beep(200,.25,.3); }

function addScore(n){ score=Math.max(0,score+n); scEl.textContent=score; }
function showPts(t,g){ var d=document.createElement('div'); d.className='fps '+(g?'g':'b'); d.textContent=t; d.style.left=(38+Math.random()*24)+'%'; d.style.top='40%'; document.body.appendChild(d); setTimeout(function(){d.remove();},1100); }
function baristaLvl(s){ return s>=80?'Barista Legend!':s>=50?'Barista Pro!':s>=25?'Barista Junior':'Стажёр'; }

/* Случайная позиция вокруг игрока в 3D */
function rndPos(){
  var a = Math.random()*Math.PI*2;
  var dist = 3 + Math.random()*4;
  return {
    x: Math.sin(a)*dist,
    y: 0.5 + Math.random()*2,
    z: Math.cos(a)*dist
  };
}

/* Стаканчик */
function makeCup(){
  var p = rndPos();
  var el = document.createElement('a-entity');
  el.setAttribute('class','clickable');
  el.setAttribute('position', p.x+' '+p.y+' '+p.z);
  el.setAttribute('scale','0.8 0.8 0.8');

  var model = document.createElement('a-entity');
  model.setAttribute('gltf-model','#cup-glb');
  el.appendChild(model);

  el.setAttribute('animation__spin','property:rotation; from:0 0 0; to:0 360 0; dur:2500; loop:true; easing:linear');
  el.setAttribute('animation__bob','property:position.y; from:'+p.y+'; to:'+(p.y+0.3)+'; dur:1200; dir:alternate; loop:true; easing:easeInOutSine');

  var taken=false;
  function onTap(e){ if(taken)return; e.stopPropagation(); taken=true; addScore(5); sndOk(); showPts('+5',true); infoEl.textContent='+5 | Очки: '+score; el.setAttribute('animation__col','property:scale; to:0 0 0; dur:200; easing:easeInBack'); setTimeout(function(){if(el.parentNode)el.remove();},220); }
  el.addEventListener('click',onTap);
  el.addEventListener('mouseenter',function(){el.setAttribute('scale','1 1 1');});
  el.addEventListener('mouseleave',function(){el.setAttribute('scale','0.8 0.8 0.8');});

  world.appendChild(el);
  setTimeout(function(){if(!taken&&el.parentNode)el.remove();},6000);
}

/* Однокурсник */
function makeStud(){
  var p = rndPos();
  var cols=['#4a7c59','#3498DB','#9B59B6','#E74C3C'];
  var col=cols[Math.floor(Math.random()*cols.length)];

  var el = document.createElement('a-entity');
  el.setAttribute('class','clickable');
  el.setAttribute('position', p.x+' '+p.y+' '+p.z);

  var torso=document.createElement('a-entity');
  torso.setAttribute('geometry','primitive:cylinder; radius:0.12; height:0.35');
  torso.setAttribute('material','color:'+col);
  torso.setAttribute('position','0 0.17 0');

  var head=document.createElement('a-entity');
  head.setAttribute('geometry','primitive:sphere; radius:0.12');
  head.setAttribute('material','color:#e8c4a0');
  head.setAttribute('position','0 0.32 0');
  head.setAttribute('animation','property:rotation; from:0 0 -5; to:0 0 5; dur:450; dir:alternate; loop:true');
  torso.appendChild(head);

  function mkLeg(px,fa,ta){
    var l=document.createElement('a-entity');
    l.setAttribute('geometry','primitive:box; width:0.08; height:0.3; depth:0.08');
    l.setAttribute('material','color:#2C3E50');
    l.setAttribute('position',px);
    l.setAttribute('animation','property:rotation; from:'+fa+' 0 0; to:'+ta+' 0 0; dur:380; dir:alternate; loop:true');
    return l;
  }
  torso.appendChild(mkLeg('-.06 -.25 0','-18','18'));
  torso.appendChild(mkLeg('.06 -.25 0','18','-18'));
  el.appendChild(torso);

  el.setAttribute('animation__bob','property:position.y; from:'+p.y+'; to:'+(p.y+0.2)+'; dur:1400; dir:alternate; loop:true; easing:easeInOutSine');

  el.addEventListener('mouseenter',function(){torso.setAttribute('material','color:#FF4444');});
  el.addEventListener('mouseleave',function(){torso.setAttribute('material','color:'+col);});

  var hit=false;
  function onHit(e){ if(hit)return; e.stopPropagation(); hit=true; addScore(-5); sndBad(); showPts('-5',false); infoEl.textContent='-5! Очки: '+score; el.setAttribute('animation__flash','property:scale; from:1.4 1.4 1.4; to:1 1 1; dur:260'); setTimeout(function(){if(el.parentNode)el.remove();},300); }
  el.addEventListener('click',onHit);

  world.appendChild(el);
  setTimeout(function(){if(!hit&&el.parentNode)el.remove();},7000);
}

function startSpawn(){ gameOn=true; makeCup(); spawnT=setInterval(makeCup,2200); studT=setInterval(makeStud,4200); }
function stopSpawn(){ gameOn=false; clearInterval(spawnT); clearInterval(studT); }
function startTimer(){
  timeLeft=60; timerEl.textContent=timeLeft;
  timerInt=setInterval(function(){ timeLeft--; timerEl.textContent=timeLeft; if(timeLeft<=0){clearInterval(timerInt); endGame();} },1000);
}
function endGame(){ stopSpawn(); document.getElementById('final-score').textContent=score; document.getElementById('level').textContent=baristaLvl(score); resultEl.classList.add('show'); }

document.getElementById('btn-again').addEventListener('click',function(){
  resultEl.classList.remove('show'); score=0; scEl.textContent='0'; gameOn=false;
  timeLeft=60; timerEl.textContent='60'; if(timerInt)clearInterval(timerInt);
  [].slice.call(world.querySelectorAll('.clickable')).forEach(function(el){el.remove();});
  startSpawn(); startTimer();
});

document.getElementById('scene').addEventListener('loaded',function(){ startSpawn(); startTimer(); });
</script>
</body>
</html>
