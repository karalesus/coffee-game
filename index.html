<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кофейня — Собери стаканчики!</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/n5ro/aframe-physics-system@v4.0.1/dist/aframe-physics-system.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #ui-overlay {
      position: fixed; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 100;
      display: none; justify-content: center;
      padding: 14px 20px;
    }
    #top-bar {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: 480px;
      background: rgba(80, 40, 10, 0.88); color: #fff;
      padding: 12px 22px; border-radius: 14px; font-size: 1.15em; font-weight: bold;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }
    #score span, #timer span { color: #ffd700; }
    #combo-display { font-size: 0.85em; color: #ffcc44; min-width: 90px; text-align: center; }

    .float-pts {
      position: fixed; font-size: 26px; font-weight: bold;
      pointer-events: none; z-index: 200;
      animation: floatup 1s ease-out forwards;
    }
    .float-pts.good { color: #ffd700; text-shadow: 0 0 10px gold; }
    .float-pts.bad  { color: #ff4444; }
    @keyframes floatup {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    #start-screen {
      position: fixed; inset: 0;
      background: rgba(40,20,5,0.93); z-index: 150;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; padding: 32px; text-align: center; gap: 12px;
    }
    #start-screen h1 { font-size: 2.4em; margin: 0; color: #ffd700; }
    #start-screen p  { max-width: 380px; line-height: 1.6; margin: 0; color: #ffe0b0; }
    #start-screen.hidden { display: none; }

    .hint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 380px; margin: 8px 0; }
    .hint-card {
      background: rgba(255,200,80,.1); border: 1px solid rgba(255,200,80,.25);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #ffe0b0;
      display: flex; align-items: center; gap: 8px;
    }
    .hint-card .ico { font-size: 22px; }

    #final-screen {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; padding: 40px; text-align: center; gap: 10px;
    }
    #final-screen.visible { display: flex; }
    #final-screen h1  { font-size: 2.4em; margin: 0; color: #ffd700; }
    #final-screen .big-score { font-size: 4.5em; color: #ffd700; line-height: 1; }
    #final-screen .level { font-size: 1.6em; color: #ff9933; }
    .stats-row { display: flex; gap: 20px; margin: 8px 0; }
    .stat-box  {
      background: rgba(255,200,80,.1); border: 1px solid rgba(255,200,80,.25);
      border-radius: 10px; padding: 10px 20px; text-align: center;
    }
    .stat-num { font-size: 1.8em; color: #ffd700; font-weight: bold; }
    .stat-lbl { font-size: 11px; color: rgba(255,200,100,.6); letter-spacing: 1px; }

    .btn {
      margin-top: 10px; padding: 14px 36px; font-size: 1.15em;
      background: #8B5A2B; color: #fff; border: none; border-radius: 10px;
      cursor: pointer; font-weight: bold; transition: .2s;
    }
    .btn:hover { background: #a0522d; transform: translateY(-2px); }
    .btn-ar { background: #1a6b5a; margin-left: 10px; }
    .btn-ar:hover { background: #228b72; }
  </style>
</head>
<body>

<a-scene id="scene"
  cursor="rayOrigin: mouse; fuse: false"
  raycaster="objects: [data-clickable]; far: 25"
  renderer="antialias: true; colorManagement: true"
  shadow="type: pcfsoft"
  vr-mode-ui="enabled: false"
  physics="debug: false">

  <a-assets timeout="20000">
    <img id="tex-wood" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
    <img id="tex-brick" src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
    <img id="tex-sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg" crossorigin="anonymous">
    <a-asset-item id="cup-model" src="assets/coffee_cup.glb"></a-asset-item>
  </a-assets>

  <a-sky id="sky" src="#tex-sky" rotation="0 -90 0"></a-sky>
  <a-light type="ambient" color="#ffeedd" intensity="0.65"></a-light>
  <a-light type="point" intensity="1.3" position="2 4 2" color="#ffcc99" distance="18" decay="1.5" cast-shadow="true"></a-light>
  <a-light type="point" intensity="0.8" position="-3 3 1" color="#ffaa66" distance="14" decay="1.5"></a-light>
  <a-light type="directional" intensity="0.4" position="0 6 5" color="#fff5e6"></a-light>

  <a-entity id="rig" position="0 1.6 6">
    <a-camera look-controls="pointerLockEnabled: false; touchEnabled: true" wasd-controls="acceleration: 30">
      <a-cursor color="#ffaa00" fuse="false" raycaster="objects: [data-clickable]" material="shader: flat; color: #ffaa00; opacity: 0.9"></a-cursor>
    </a-camera>
  </a-entity>

  <a-entity id="floor" geometry="primitive: plane; width: 30; height: 30" material="src: #tex-wood; repeat: 8 8" rotation="-90 0 0" position="0 0 0" shadow="receive: true" static-body></a-entity>

  <a-entity id="walls" position="0 0 0">
    <a-entity geometry="primitive: plane; width: 30; height: 7"
              material="src: #tex-brick; repeat: 6 1; color: #7a4020"
              position="0 3.5 -15"
              shadow="receive: true"></a-entity>
    <a-entity geometry="primitive: plane; width: 30; height: 7"
              material="src: #tex-brick; repeat: 6 1; color: #7a4020"
              position="0 3.5 15" rotation="0 180 0"></a-entity>
    <a-entity geometry="primitive: plane; width: 30; height: 7"
              material="src: #tex-brick; repeat: 6 1; color: #7a4020"
              position="-15 3.5 0" rotation="0 90 0"></a-entity>
    <a-entity geometry="primitive: plane; width: 30; height: 7" material="src: #tex-brick; repeat: 6 1; color: #7a4020" position="15 3.5 0" rotation="0 -90 0"></a-entity>
    <a-entity geometry="primitive: plane; width: 30; height: 30" material="color: #2a1200" position="0 7 0" rotation="90 0 0"></a-entity>
  </a-entity>

  <a-entity id="interior" position="0 0 -3">
    <a-text value="КОФЕЙНЯ" color="#FFD700" align="center" position="0 5.5 -14.4" scale="2 2 2" animation="property: color; from: #FFD700; to: #FF8C00; dur: 1500; dir: alternate; loop: true"></a-text>
    <a-entity id="counter" position="0 0 -8">
      <a-entity geometry="primitive: box; width: 8; height: 1; depth: 1.2" material="src: #tex-wood; color: #8B4513" position="0 0.5 0" shadow="cast: true; receive: true"></a-entity>
      <a-entity position="0 1.2 0">
        <a-entity geometry="primitive: box; width: 0.7; height: 0.8; depth: 0.5" material="color: #C0392B; metalness: 0.7; roughness: 0.3" shadow="cast: true"></a-entity>
        <a-entity geometry="primitive: plane; width: 0.35; height: 0.2" material="color: #00FFAA; emissive: #00FFAA; emissiveIntensity: 0.6" position="0 0.12 0.26"></a-entity>
        <a-entity geometry="primitive: cylinder; radius: 0.04; height: 0.15" material="color: #888; metalness: 0.9" position="0 -0.2 0.26" rotation="90 0 0"></a-entity>
      </a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.06; height: 0.5" material="color: #5c3a1e" position="-3.5 -0.25 0"></a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.06; height: 0.5" material="color: #5c3a1e" position="3.5 -0.25 0"></a-entity>
    </a-entity>
    <a-entity id="table-1" position="-4 0 2">
      <a-entity geometry="primitive: box; width: 2.2; height: 0.08; depth: 1.2" material="src: #tex-wood; color: #a0522d" position="0 0.9 0" shadow="cast: true; receive: true"></a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.05; height: 0.9" material="color: #5c3a1e" position="-0.95 0.45 -0.5"></a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.05; height: 0.9" material="color: #5c3a1e" position="0.95 0.45 -0.5"></a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.05; height: 0.9" material="color: #5c3a1e" position="-0.95 0.45 0.5"></a-entity>
      <a-entity geometry="primitive: cylinder; radius: 0.05; height: 0.9" material="color: #5c3a1e" position="0.95 0.45 0.5"></a-entity>
    </a-entity>
    <a-entity position="-4 6.8 -4">
      <a-entity geometry="primitive: cylinder; radius: 0.02; height: 0.7" material="color: #333" position="0 -0.35 0"></a-entity>
      <a-light type="point" color="#FFCC66" intensity="1.8" distance="7" position="0 -0.85 0"></a-light>
    </a-entity>
  </a-entity>

  <a-entity id="game-objects"></a-entity>

</a-scene>

<div id="start-screen">
  <h1>Кофейня</h1>
  <p>Собирай стаканчики с кофе!</p>
  <div class="hint-grid">
    <div class="hint-card"><span><b>+5</b> за стаканчик</span></div>
    <div class="hint-card"><span>30 секунд на смену</span></div>
  </div>
  <div>
    <button class="btn" id="btn-start">Начать игру</button>
    <button class="btn btn-ar" onclick="window.open('ar.html','_blank')">AR маркер</button>
    <button class="btn btn-ar" onclick="window.open('ar-gps.html','_blank')">AR GPS</button>
  </div>
</div>

<div id="ui-overlay">
  <div id="top-bar">
    <span id="score">Очки: <span>0</span></span>
    <span id="combo-display"></span>
    <span id="timer">Время: <span>30</span> с</span>
  </div>
</div>

<div id="final-screen">
  <h1>Смена окончена!</h1>
  <div class="big-score" id="final-score">0</div>
  <div class="level" id="barista-level">—</div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-caught">0</div><div class="stat-lbl">ПОЙМАНО</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-miss">0</div><div class="stat-lbl">ПРОМАХОВ</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-combo">0</div><div class="stat-lbl">МАКС. КОМБО</div></div>
  </div>
  <div>
    <button class="btn" id="btn-restart">Ещё смену!</button>
    <button class="btn btn-ar" onclick="window.open('ar.html','_blank')">AR маркер</button>
    <button class="btn btn-ar" onclick="window.open('ar-gps.html','_blank')">AR GPS</button>
  </div>
</div>

<script>
var GAME_DURATION = 30;
var CUP_PTS = 5;

var LEVELS = [
  [0,  'Стажёр'],
  [30, 'Barista Junior'],
  [55, 'Barista Pro'],
  [80, 'Barista Legend!']
];

var scoreEl     = document.querySelector('#score span');
var timerEl     = document.querySelector('#timer span');
var comboEl     = document.getElementById('combo-display');
var startScreen = document.getElementById('start-screen');
var uiOverlay   = document.getElementById('ui-overlay');
var finalScreen = document.getElementById('final-screen');
var gameObjects = document.getElementById('game-objects');

var score = 0;
var timeLeft = 30;
var combo = 0;
var maxCombo = 0;
var caught = 0;
var miss = 0;
var gameRunning = false;
var cupN = 0;
var timerID = null;
var spawnID = null;

var audioCtx = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, dur, vol, delay) {
  vol = vol || 0.28;
  delay = delay || 0;
  try {
    var ctx = getAudioContext();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur);
  } catch (e) {}
}

function sndCollect() {
  playTone(440, 'sine', 0.12, 0.3);
  playTone(554, 'sine', 0.12, 0.3, 0.1);
}

function sndEnd() {
  [523, 659, 784, 1047].forEach(function (freq, i) {
    playTone(freq, 'sine', 0.4, 0.4, i * 0.14);
  });
}

function getBaristaLevel(score) {
  var level = LEVELS[0][1];
  LEVELS.forEach(function (row) {
    if (score >= row[0]) level = row[1];
  });
  return level;
}

function showFloatingPts(text, isGood) {
  var el = document.createElement('div');
  el.className = 'float-pts ' + (isGood ? 'good' : 'bad');
  el.textContent = text;
  el.style.left = (35 + Math.random() * 28) + '%';
  el.style.top = (35 + Math.random() * 20) + '%';
  document.body.appendChild(el);
  setTimeout(function () { el.remove(); }, 1100);
}

function updateScore(delta) {
  score = Math.max(0, score + delta);
  scoreEl.textContent = score;
  document.getElementById('final-score').textContent = score;
}

function updateComboDisplay() {
  comboEl.textContent = combo >= 3 ? '×' + combo : '';
}

function startGame() {
  score = 0;
  timeLeft = GAME_DURATION;
  combo = 0;
  maxCombo = 0;
  caught = 0;
  miss = 0;
  cupN = 0;
  gameRunning = true;

  clearInterval(timerID);
  clearInterval(spawnID);

  startScreen.classList.add('hidden');
  finalScreen.classList.remove('visible');
  uiOverlay.style.display = 'flex';
  scoreEl.textContent = '0';
  timerEl.textContent = GAME_DURATION;
  comboEl.textContent = '';

  gameObjects.innerHTML = '';

  timerID = setInterval(function () {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 0) endGame();
  }, 1000);

  spawnCup();
  spawnID = setInterval(spawnCup, 2000);
}

function endGame() {
  gameRunning = false;
  clearInterval(timerID);
  clearInterval(spawnID);
  sndEnd();

  setTimeout(function () {
    uiOverlay.style.display = 'none';
    document.getElementById('final-score').textContent = score;
    document.getElementById('barista-level').textContent = getBaristaLevel(score);
    document.getElementById('stat-caught').textContent = caught;
    document.getElementById('stat-miss').textContent = miss;
    document.getElementById('stat-combo').textContent = maxCombo;
    finalScreen.classList.add('visible');
  }, 900);
}

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-restart').addEventListener('click', startGame);

function spawnCup() {
  if (!gameRunning) return;

  var x = (Math.random() - 0.5) * 12;
  var z = (Math.random() - 0.5) * 10 - 3;
  var y = 1.4 + Math.random() * 2;
  var lifetime = 4000 + Math.floor(Math.random() * 2000);

  var el = document.createElement('a-entity');
  el.setAttribute('id', 'cup' + (cupN++));
  el.setAttribute('class', 'clickable');
  el.setAttribute('data-clickable', '');
  el.setAttribute('position', x + ' ' + y + ' ' + z);
  el.setAttribute('geometry', 'primitive: cylinder; radiusTop: 0.15; radiusBottom: 0.12; height: 0.4; segmentsRadial: 8');
  el.setAttribute('material', 'opacity: 0; transparent: true; side: double');

  var model = document.createElement('a-entity');
  model.setAttribute('gltf-model', '#cup-model');
  model.setAttribute('scale', '3.3 3.3 3.3');
  el.appendChild(model);

  var steam = document.createElement('a-entity');
  steam.setAttribute('geometry', 'primitive: sphere; radius: 0.035');
  steam.setAttribute('material', 'color: #fff; opacity: 0.5; transparent: true');
  steam.setAttribute('position', '0 0.28 0');
  steam.setAttribute('animation', 'property: position; from: 0 0.28 0; to: 0 0.6 0; dur: 1200; loop: true; easing: easeOutQuad');
  steam.setAttribute('animation__fade', 'property: material.opacity; from: 0.5; to: 0; dur: 1200; loop: true');
  el.appendChild(steam);

  el.setAttribute('animation__spin', 'property: rotation; from: 0 0 0; to: 0 360 0; dur: 3000; loop: true; easing: linear');
  el.setAttribute('animation__bob', 'property: position; to: ' + x + ' ' + (y + 0.3) + ' ' + z + '; dir: alternate; dur: ' + (1400 + Math.floor(Math.random() * 400)) + '; loop: true; easing: easeInOutSine');

  el.addEventListener('mouseenter', function () { el.setAttribute('scale', '1.25 1.25 1.25'); });
  el.addEventListener('mouseleave', function () { el.setAttribute('scale', '1 1 1'); });

  var taken = false;
  el.addEventListener('click', function () {
    if (!gameRunning || taken) return;
    taken = true;
    combo++;
    caught++;
    if (combo > maxCombo) maxCombo = combo;
    var pts = CUP_PTS + (combo >= 3 ? Math.floor(combo * 1.5) : 0);
    updateScore(pts);
    updateComboDisplay();
    sndCollect();
    showFloatingPts('+' + pts, true);
    el.setAttribute('animation__collect', 'property: scale; from: 1 1 1; to: 0 0 0; dur: 260; easing: easeInBack');
    setTimeout(function () { if (el.parentNode) el.remove(); }, 300);
  });

  gameObjects.appendChild(el);
  setTimeout(function () {
    if (!taken) {
      miss++;
      combo = 0;
      updateComboDisplay();
      if (el.parentNode) el.remove();
    }
  }, lifetime + 300);
}
</script>
</body>
</html>
